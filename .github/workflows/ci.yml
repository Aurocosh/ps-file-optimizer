name: CI

# Bundle cache keys — bump when pins change in Get-FoPluginBundleMetadata.ps1 / Get-FoDssimBundleMetadata.ps1
# Plugins x64 SHA256: 64cbf3ab2c8bd2dbd097b77286dd439d19f9c37f9fadbc1420ccefcd968847b2
# Plugins x86 SHA256: 7ae02081cc2baf7e4caa976bac0798beacf7feb42f3d1e54e1182e18f3960b0c
# DSSIM SHA256:       c9cb7089a62fd8c2655e778fc576d9f1f453eb3ecfb98bb6914f1ff086ceda4c

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Prefer the newest push on a ref: cancel superseded runs so only the tip can publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unit tests
        shell: pwsh
        run: |
          ./Scripts/Invoke-FoTests.ps1 -Tag Unit -ExcludeTag ImageIntegration,Lossy,Slow

  image-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore installed plugin cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/FoPlugins64
          key: fo-ci-plugins64-v1.1.0-64cbf3ab2c8bd2dbd097b77286dd439d19f9c37f9fadbc1420ccefcd968847b2-dssim-c9cb7089a62fd8c2655e778fc576d9f1f453eb3ecfb98bb6914f1ff086ceda4c

      - name: Install plugin bundle
        shell: pwsh
        run: |
          $pluginDir = Join-Path $env:RUNNER_TEMP 'FoPlugins64'
          $magick = Join-Path $pluginDir 'magick.exe'
          $dssim = Join-Path $pluginDir 'dssim\dssim.exe'
          if (-not ((Test-Path -LiteralPath $magick) -and (Test-Path -LiteralPath $dssim))) {
            if (-not (Test-Path -LiteralPath $pluginDir)) {
              New-Item -ItemType Directory -Path $pluginDir -Force | Out-Null
            }
            ./Scripts/Install-Plugins.ps1 -Mode FullPortable -Architecture 64 -PluginPath $pluginDir
            ./Scripts/Install-Dssim.ps1 -PluginPath $pluginDir
          }
          else {
            Write-Host "Plugin install cache hit ($pluginDir)."
          }
          "FO_TEST_PLUGIN_PATH=$pluginDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Image smoke tests
        shell: pwsh
        env:
          FO_TEST_ARTIFACT_DIR: ${{ runner.temp }}/FoTestArtifacts
        run: |
          ./Scripts/Invoke-FoTests.ps1 -Tag Smoke

      - name: Upload smoke failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: image-smoke-failures-${{ github.run_id }}
          path: ${{ runner.temp }}/FoTestArtifacts
          if-no-files-found: ignore

  integration-downloads:
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Restore bundle archive cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/FoBundleArchiveCache
          key: fo-ci-bundles-v1.1.0-64cbf3ab2c8bd2dbd097b77286dd439d19f9c37f9fadbc1420ccefcd968847b2-7ae02081cc2baf7e4caa976bac0798beacf7feb42f3d1e54e1182e18f3960b0c-dssim-c9cb7089a62fd8c2655e778fc576d9f1f453eb3ecfb98bb6914f1ff086ceda4c

      - name: Integration tests
        shell: pwsh
        env:
          FO_RUN_INSTALL_INTEGRATION: '1'
          FO_RUN_CORPUS_INTEGRATION: '1'
          FO_PLUGIN_BUNDLE_CACHE_DIR: ${{ runner.temp }}/FoBundleArchiveCache
        run: |
          ./Scripts/Invoke-FoTests.ps1 -Tag Integration

  release:
    runs-on: windows-latest
    needs: [unit, image-smoke, integration-downloads]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.unit.result == 'success' &&
      needs.image-smoke.result == 'success' &&
      needs.integration-downloads.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip publish when this commit is no longer tip of master
        id: tip
        shell: pwsh
        run: |
          git fetch --quiet origin master
          $head = git rev-parse HEAD
          $tip = git rev-parse origin/master
          if ($head -ne $tip) {
            Write-Host "Skipping publish: HEAD $head is behind origin/master tip $tip."
            "should_publish=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          else {
            Write-Host "HEAD $head is tip of origin/master; continuing publish."
            "should_publish=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Publish GitHub release when ModuleVersion increases
        if: steps.tip.outputs.should_publish == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./Scripts/Invoke-FoGitHubRelease.ps1

      - name: Publish to PowerShell Gallery when ModuleVersion increases
        if: steps.tip.outputs.should_publish == 'true'
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          ./Scripts/Invoke-FoPSGalleryPublish.ps1
